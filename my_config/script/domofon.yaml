  domofon_locks_indicator:
    alias: Domofon Locks Indicator
    sequence:
      - action: light.turn_off
        entity_id: light.esp32_domofon_led
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.bottom_lock
                state: "off"
            sequence:
              - action: light.turn_on
                data:
                  entity_id: light.esp32_domofon_led
                  effect: "Blink"
                  brightness: 50
                  color_name: "orange"
          - conditions:
              - condition: state
                entity_id: binary_sensor.top_lock
                state: "off"
            sequence:
              - action: light.turn_on
                entity_id: light.esp32_domofon_led
                data:
                  brightness: 50
                  color_name: "orange"

  domofon_open_door:
    alias: Domofon Open Door
    sequence:
      - action: button.press
        entity_id: button.smartintercom_ru_propustit
      - action: switch.turn_off
        entity_id: switch.smartintercom_ru_otkliuchit_trubku_domofona, switch.smartintercom_ru_otkryvat_na_sleduiushchii_zvonok, switch.smartintercom_ru_otkryvat_vsegda